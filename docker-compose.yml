services:
  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: boxing-gym-management
    ports:
      # 5433 avoids clashing with a local PostgreSQL install on 5432 (wrong DB → missing tables).
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./migrations/init:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_data:
